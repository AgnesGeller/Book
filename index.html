<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Díszkertek lapozható kerti ágyás katalógus kertépítéshez, magyarországi évelő növényekkel." />
    <title>Díszkertek - Kerti ágyás katalógus</title>
    <link rel="icon" type="image/png" href="./assets/img/logo.png" />
    <link rel="apple-touch-icon" href="./assets/img/logo.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip/dist/css/page-flip.min.css" />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="https://diszkertek.hu/" target="_blank" rel="noreferrer">
        <img src="./assets/img/logo.png" alt="Díszkertek logó" />
        <span>
          <strong>Díszkertek</strong>
          <small>Minden, ami kerttel kapcsolatos</small>
        </span>
      </a>
      <nav class="quick-links" aria-label="Gyors linkek">
        <a href="https://diszkertek.hu/" target="_blank" rel="noreferrer">www.diszkertek.hu</a>
        <a href="tel:+36706349630">+36 70 634 9630</a>
        <a href="https://www.facebook.com/profile.php?id=61581708015145" target="_blank" rel="noreferrer">Facebook</a>
      </nav>
    </header>

    <main>
      <section class="catalog-controls" aria-label="Katalógus keresés és szűrés">
        <label class="search-control">
          <span>Keresés</span>
          <input id="searchInput" type="search" placeholder="pl. 2x2 japán" autocomplete="off" />
        </label>

        <label>
          <span>Méret</span>
          <select id="sizeFilter">
            <option value="">Minden méret</option>
          </select>
        </label>

        <label>
          <span>Stílus irányzat</span>
          <select id="styleFilter">
            <option value="">Minden stílus</option>
          </select>
        </label>

        <button id="searchButton" type="button">Keresés</button>
      </section>

      <section class="book-shell" aria-label="Lapozható flip-book katalógus">
        <div class="book-topline">
          <p id="resultInfo">Betöltés...</p>
          <div class="pager">
            <button id="prevPage" type="button" aria-label="Előző oldal">‹</button>
            <span id="pageInfo">1 / 1</span>
            <button id="nextPage" type="button" aria-label="Következő oldal">›</button>
          </div>
        </div>

        <div class="flipbook-frame">
          <div id="flipBook" class="page-flip"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="./assets/main.js"></script>
  </body>
</html>
